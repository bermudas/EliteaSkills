    structured_output: true
    transition: present_ui_context
  - id: fetch_conversation_context
    type: code
    code:
      type: fixed
      value: |
        import httpx

        target_project_id = elitea_state.get('project_id', 0)
        target_entity_id = elitea_state.get('entity_id', 0)
        target_entity_type = (elitea_state.get('entity_type', '') or '').lower()

        SECRET_MARKERS = {
            'password', 'token', 'api_key', 'secret', 'client_secret',
            'authorization', 'bearer', 'private_key', 'access_token',
            'refresh_token', 'webhook_secret', 'x-api-key', 'apikey',
        }

        def redact(obj):
            if isinstance(obj, dict):
                redacted = {}
                for k, v in obj.items():
                    key = str(k).lower()
                    redacted[k] = '***REDACTED***' if any(marker in key for marker in SECRET_MARKERS) else redact(v)
                return redacted
            if isinstance(obj, list):
                return [redact(x) for x in obj]
            return obj

        async def response_payload(resp):
            try:
                payload = resp.json()
            except Exception:
                payload = {'raw': resp.text}
            return payload if resp.status_code < 400 else {
                'error': payload,
                'status_code': resp.status_code,
            }

        result = {
            'project_id': int(target_project_id) if target_project_id else 0,
            'entity_id': int(target_entity_id) if target_entity_id else 0,
            'entity_type': target_entity_type,
            'fetch_method': 'GET conversation details + messages APIs',
        }

        if not target_project_id:
            result['error'] = 'project_id missing from UI context'
        elif not target_entity_id:
            result['error'] = 'entity_id missing from UI context'
        else:
            headers = {
                'Authorization': f'Bearer {elitea_client.auth_token}',
                'Content-Type': 'application/json',
            }
            base_url = elitea_client.base_url.rstrip('/')
            conversation_url = (
                f"{base_url}/api/v2/elitea_core/conversation/prompt_lib/"
                f"{int(target_project_id)}/{int(target_entity_id)}"
            )
            messages_url = (
                f"{base_url}/api/v2/elitea_core/messages/prompt_lib/"
                f"{int(target_project_id)}/{int(target_entity_id)}"
            )
            try:
                async with httpx.AsyncClient(timeout=30, follow_redirects=True) as http:
                    conversation_resp = await http.get(conversation_url, headers=headers)
                    messages_resp = await http.get(
                        messages_url,
                        headers=headers,
                        params={
                            'limit': 100,
                            'offset': 0,
                            'sort_by': 'created_at',
                            'sort_order': 'asc',
                        },
                    )
                result['conversation'] = await response_payload(conversation_resp)
                result['messages'] = await response_payload(messages_resp)
            except Exception as e:
                result['error'] = str(e)

        {'ui_context': redact(result)}
    input:
      - entity_id
      - entity_type
      - project_id
    output:
      - ui_context
    structured_output: true
    transition: present_ui_context
  - id: unsupported_entity_type
    type: code
    code:
      type: fixed
      value: |
        target_project_id = elitea_state.get('project_id', 0)
        target_entity_id = elitea_state.get('entity_id', 0)
        target_entity_type = elitea_state.get('entity_type', '')
        target_version_id = elitea_state.get('version_id', 0)

        {'ui_context': {
            'project_id': int(target_project_id) if target_project_id else 0,
            'entity_id': int(target_entity_id) if target_entity_id else 0,
            'entity_type': target_entity_type,
            'version_id': int(target_version_id) if target_version_id else 0,
            'error': f'Unsupported entity_type: {target_entity_type}',
            'supported_entity_types': [
                'agent', 'pipeline', 'app', 'toolkit', 'mcp', 'credential', 'conversation',
            ],
        }}
    input:
      - entity_id
      - entity_type
      - project_id
      - version_id
    output:
      - ui_context
    structured_output: true
    transition: present_ui_context
  - id: present_ui_context
    type: llm
    input:
      - ui_context
    input_mapping:
      chat_history:
        type: fixed
        value: []
      system:
        type: fixed
        value: Return the ui_context to user as it is.
      task:
        type: fstring
        value: 'ui_context: {ui_context}'
    output: []
    structured_output: false
    transition: END
